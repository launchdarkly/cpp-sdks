        env:
          HASHES: ${{ steps.release-server-dynamodb.outputs.hashes-macos }}
        run: |
          # This job always runs on macOS, so use -D (BSD base64 decode).
          echo "${HASHES}" | base64 -D > checksums.txt
        shell: bash
      # https://github.com/actions/attest/releases/tag/v4.1.0
