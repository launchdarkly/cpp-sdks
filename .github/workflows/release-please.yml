          tag_name: ${{ needs.release-please.outputs.package-server-dynamodb-tag }}
          github_token: ${{secrets.GITHUB_TOKEN}}
          sdk_path: 'libs/server-sdk-dynamodb-source'
          sdk_cmake_target: 'launchdarkly-cpp-server-dynamodb-source'
