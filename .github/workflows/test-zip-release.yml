# Temporary workflow to verify the zip-release composite action produces
# identical output to the old thedoctor0/zip-release action.
# This workflow should be removed after verification.

name: Test zip-release action

on:
  push:
    branches:
      - 'devin/*replace-zip-release*'

jobs:
  test-zip:
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Create test directory structure
        shell: bash
        run: |
          # Mimic the build output structure used by sdk-release
          mkdir -p build-static/release/include
          mkdir -p build-static/release/lib
          echo "// test header" > build-static/release/include/launchdarkly.h
          echo "static lib content" > build-static/release/lib/liblaunchdarkly.a
          echo "README" > build-static/release/README.md

          mkdir -p build-dynamic/release/include
          mkdir -p build-dynamic/release/lib
          echo "// test header" > build-dynamic/release/include/launchdarkly.h
          echo "dynamic lib content" > build-dynamic/release/lib/liblaunchdarkly.so
          echo "README" > build-dynamic/release/README.md

      - name: Zip with new action (static)
        uses: ./.github/actions/zip-release
        with:
          path: 'build-static/release'
          filename: 'test-static.zip'

      - name: Zip with new action (dynamic)
        uses: ./.github/actions/zip-release
        with:
          path: 'build-dynamic/release'
          filename: 'test-dynamic.zip'

      - name: Verify zip files exist with correct names
        shell: bash
        run: |
          echo "=== Checking zip files exist ==="
          ls -la test-static.zip test-dynamic.zip
          echo "PASS: Both zip files exist"

      - name: Verify zip contents (no extra root folder)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "=== Contents of test-static.zip ==="
            7z l test-static.zip
            echo ""
            echo "=== Contents of test-dynamic.zip ==="
            7z l test-dynamic.zip

            # Verify the path structure inside the zip
            echo ""
            echo "=== Verifying path structure ==="
            STATIC_LIST=$(7z l -slt test-static.zip | grep "^Path = " | sed 's/^Path = //')
            echo "Files in static zip:"
            echo "$STATIC_LIST"

            # Check that paths start with build-static/release (matching old behavior)
            if echo "$STATIC_LIST" | grep -q "build-static/release/include/launchdarkly.h"; then
              echo "PASS: Static zip contains correct path structure"
            elif echo "$STATIC_LIST" | grep -q "build-static\\\\release\\\\include\\\\launchdarkly.h"; then
              echo "PASS: Static zip contains correct path structure (Windows paths)"
            else
              echo "FAIL: Unexpected path structure in static zip"
              exit 1
            fi
          else
            echo "=== Contents of test-static.zip ==="
            unzip -l test-static.zip
            echo ""
            echo "=== Contents of test-dynamic.zip ==="
            unzip -l test-dynamic.zip

            # Verify the path structure inside the zip using zipinfo
            echo ""
            echo "=== Verifying path structure ==="
            STATIC_LIST=$(zipinfo -1 test-static.zip)
            echo "Files in static zip:"
            echo "$STATIC_LIST"

            # Check that paths start with build-static/release (matching old behavior)
            if echo "$STATIC_LIST" | grep -q "build-static/release/include/launchdarkly.h"; then
              echo "PASS: Static zip contains correct path structure"
            else
              echo "FAIL: Unexpected path structure in static zip"
              exit 1
            fi

            DYNAMIC_LIST=$(zipinfo -1 test-dynamic.zip)
            echo "Files in dynamic zip:"
            echo "$DYNAMIC_LIST"

            if echo "$DYNAMIC_LIST" | grep -q "build-dynamic/release/lib/liblaunchdarkly.so"; then
              echo "PASS: Dynamic zip contains correct path structure"
            else
              echo "FAIL: Unexpected path structure in dynamic zip"
              exit 1
            fi
          fi

      - name: Test platform-specific filenames match sdk-release expectations
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            EXPECTED_NAMES=("linux-gcc-x64-static.zip" "linux-gcc-x64-dynamic.zip" "linux-gcc-x64-static-curl.zip" "linux-gcc-x64-dynamic-curl.zip")
          elif [ "$RUNNER_OS" = "Windows" ]; then
            EXPECTED_NAMES=("windows-msvc-x64-static.zip" "windows-msvc-x64-dynamic.zip" "windows-msvc-x64-static-debug.zip" "windows-msvc-x64-dynamic-debug.zip")
          elif [ "$RUNNER_OS" = "macOS" ]; then
            EXPECTED_NAMES=("mac-clang-x64-static.zip" "mac-clang-x64-dynamic.zip")
          fi

          echo "=== Testing platform-specific filenames ==="
          for NAME in "${EXPECTED_NAMES[@]}"; do
            # Create a test dir and zip it with the expected name
            mkdir -p test-dir/release/lib
            echo "test" > test-dir/release/lib/test.a
          done

      - name: Generate all expected zip filenames
        shell: bash
        run: |
          # Test that the action can produce each expected filename
          mkdir -p dummy/release/lib
          echo "test" > dummy/release/lib/test.a

      - name: Zip with expected Linux filenames
        if: runner.os == 'Linux'
        uses: ./.github/actions/zip-release
        with:
          path: 'dummy/release'
          filename: 'linux-gcc-x64-static.zip'

      - name: Zip with expected Linux dynamic filename
        if: runner.os == 'Linux'
        uses: ./.github/actions/zip-release
        with:
          path: 'dummy/release'
          filename: 'linux-gcc-x64-dynamic.zip'

      - name: Zip with expected Linux curl static filename
        if: runner.os == 'Linux'
        uses: ./.github/actions/zip-release
        with:
          path: 'dummy/release'
          filename: 'linux-gcc-x64-static-curl.zip'

      - name: Zip with expected Linux curl dynamic filename
        if: runner.os == 'Linux'
        uses: ./.github/actions/zip-release
        with:
          path: 'dummy/release'
          filename: 'linux-gcc-x64-dynamic-curl.zip'

      - name: Zip with expected Windows filenames
        if: runner.os == 'Windows'
        uses: ./.github/actions/zip-release
        with:
          path: 'dummy/release'
          filename: 'windows-msvc-x64-static.zip'

      - name: Zip with expected Windows dynamic filename
        if: runner.os == 'Windows'
        uses: ./.github/actions/zip-release
        with:
          path: 'dummy/release'
          filename: 'windows-msvc-x64-dynamic.zip'

      - name: Zip with expected Windows static debug filename
        if: runner.os == 'Windows'
        uses: ./.github/actions/zip-release
        with:
          path: 'dummy/release'
          filename: 'windows-msvc-x64-static-debug.zip'

      - name: Zip with expected Windows dynamic debug filename
        if: runner.os == 'Windows'
        uses: ./.github/actions/zip-release
        with:
          path: 'dummy/release'
          filename: 'windows-msvc-x64-dynamic-debug.zip'

      - name: Zip with expected macOS filenames
        if: runner.os == 'macOS'
        uses: ./.github/actions/zip-release
        with:
          path: 'dummy/release'
          filename: 'mac-clang-x64-static.zip'

      - name: Zip with expected macOS dynamic filename
        if: runner.os == 'macOS'
        uses: ./.github/actions/zip-release
        with:
          path: 'dummy/release'
          filename: 'mac-clang-x64-dynamic.zip'

      - name: Verify all expected filenames were created
        shell: bash
        run: |
          echo "=== Verifying all expected zip files ==="
          if [ "$RUNNER_OS" = "Linux" ]; then
            ls -la linux-gcc-x64-static.zip linux-gcc-x64-dynamic.zip linux-gcc-x64-static-curl.zip linux-gcc-x64-dynamic-curl.zip
            echo "PASS: All Linux zip filenames match expectations"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            ls -la windows-msvc-x64-static.zip windows-msvc-x64-dynamic.zip windows-msvc-x64-static-debug.zip windows-msvc-x64-dynamic-debug.zip
            echo "PASS: All Windows zip filenames match expectations"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            ls -la mac-clang-x64-static.zip mac-clang-x64-dynamic.zip
            echo "PASS: All macOS zip filenames match expectations"
          fi

      - name: Upload artifacts for inspection
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zip-test-${{ runner.os }}
          path: '*.zip'
